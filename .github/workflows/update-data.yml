name: Update Spend Data

on:
  schedule:
    # Run at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (lxml)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            gcc \
            python3-dev

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Scrape latest spend data
        run: python scrape_data.py --skip-existing

      - name: Check for new data
        id: check-changes
        run: |
          changed=false
          # Check for changes to tracked files
          if ! git diff --quiet -- _data/spendsOver500/ headers.csv; then
            changed=true
          fi
          # Check for newly created untracked files in the same paths
          if [ -n "$(git ls-files --others --exclude-standard -- _data/spendsOver500/ headers.csv)" ]; then
            changed=true
          fi
          if [ "$changed" = true ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/spendsOver500/ headers.csv
          git commit -m "chore: update spend data $(date +'%Y-%m')"
          git push
